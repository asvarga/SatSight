<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>SatSight</title>
    <!-- Trunk builds this crate to wasm and injects the loader (plan §9). -->
    <link data-trunk rel="rust" href="Cargo.toml" data-bin="satsight-app" data-wasm-opt="0" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1e1e1e;
      }
      /* eframe drives the canvas size; fill the viewport. */
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="satsight_canvas"></canvas>
  </body>
</html>
