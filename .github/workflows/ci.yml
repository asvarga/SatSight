name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GUI build deps (eframe/egui)
        # System libraries eframe needs to build on Linux (x11/xkb/ssl).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  # Keep the nix dev shell green: check the flake and make sure the shell
  # evaluates and builds.
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check the flake
        run: nix flake check ./nix
      - name: Build the dev shell
        run: nix develop ./nix --command true

  # Build the wasm demo (release profile) and publish it as an asset on a
  # rolling "web-latest" release, so asvarga.github.io can pull the latest
  # prebuilt bundle over a plain HTTPS download — no cross-repo credentials
  # needed since this repo is public. See satsight-app/index.html for the
  # public-url path this is built for (/site/satsight/ on that site).
  deploy-demo:
    name: Publish web demo
    needs: [rust, nix]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build the wasm demo (release)
        run: |
          nix develop ./nix --command bash -c \
            "cd satsight-app && trunk build --release --public-url /site/satsight/"
      - name: Package the build
        run: tar -C satsight-app/dist -czf satsight-web.tar.gz .
      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: web-latest
          name: Latest web demo build
          make_latest: false
          prerelease: true
          body: >
            Automatically rebuilt from ${{ github.sha }} on every push to main.
            Consumed by asvarga.github.io at /site/satsight/ — not meant to be
            browsed as a release.
          files: satsight-web.tar.gz
